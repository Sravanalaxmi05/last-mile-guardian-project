kind = "web"
previewPath = "/"
title = "Last-Mile Guardian"
version = "1.0.0"
id = "artifacts/last-mile-guardian"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24730

[services.development]
run = "pnpm --filter @workspace/last-mile-guardian run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/last-mile-guardian", "run", "build" ]
publicDir = "artifacts/last-mile-guardian/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24730"
BASE_PATH = "/"
