name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm --filter @workspace/api-server test
      - run: pnpm run build
      - run: |
          if grep -R "gemma-3-27b-it" -n README.md replit.md artifacts lib --exclude-dir=node_modules --exclude-dir=dist; then
            echo "Found forbidden Gemma 3 model reference"
            exit 1
          fi
