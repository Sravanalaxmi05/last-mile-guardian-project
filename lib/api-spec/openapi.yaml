openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Last-Mile Guardian API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: personas
    description: Persona operations
  - name: cards
    description: Action card generation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /gemma-status:
    get:
      operationId: gemmaStatus
      tags: [health]
      summary: Gemma live-mode status
      description: Returns non-secret Gemma 4 live-mode configuration status
      responses:
        "200":
          description: Gemma configuration status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GemmaStatus"

  /personas:
    get:
      operationId: listPersonas
      tags: [personas]
      summary: Get available personas
      description: Returns the list of predefined vulnerable personas
      responses:
        "200":
          description: List of personas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Persona"

  /action-cards:
    post:
      operationId: generateActionCards
      tags: [cards]
      summary: Generate action cards
      description: Generate personalized survival action cards for a flood alert and persona
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionCardRequest"
      responses:
        "200":
          description: Generated action cards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionCardResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Strict live Gemma 4 failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /action-cards/from-image:
    post:
      operationId: generateActionCardsFromImage
      tags: [cards]
      summary: Generate action cards from an official alert image
      description: Uses Gemma 4 multimodal input to extract official alert text from an image, then generates validated action cards.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImageActionCardRequest"
      responses:
        "200":
          description: Generated action cards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionCardResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Strict live Gemma 4 failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /action-cards/compare:
    post:
      operationId: comparePersonas
      tags: [cards]
      summary: Compare all personas
      description: Generate action cards for all personas with the same alert for side-by-side comparison
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompareRequest"
      responses:
        "200":
          description: Action cards for all personas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PersonaCardPair"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Strict live Gemma 4 failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    GemmaStatus:
      type: object
      required: [configured, provider, model, isGemma4, demoModeEnabled, hasApiKey]
      properties:
        configured:
          type: boolean
        provider:
          type: string
        model:
          type: string
        isGemma4:
          type: boolean
        demoModeEnabled:
          type: boolean
        hasApiKey:
          type: boolean

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Persona:
      type: object
      required: [id, name, age, description, conditions, floor, canEvacuateAlone, languagePreference, internetStrength]
      properties:
        id:
          type: string
        name:
          type: string
        age:
          type: integer
        description:
          type: string
        conditions:
          type: array
          items:
            type: string
        floor:
          type: string
        canEvacuateAlone:
          type: boolean
        languagePreference:
          type: string
        internetStrength:
          type: string

    ActionCardRequest:
      type: object
      required: [alertText, personaId]
      properties:
        alertText:
          type: string
          description: The official flood alert text
        personaId:
          type: string
          description: The persona ID to generate cards for
        apiKey:
          type: string
          description: Optional API key for live Gemma 4 mode (used only in memory, never stored)

    ImageActionCardRequest:
      type: object
      required: [imageBase64, mimeType, personaId]
      properties:
        imageBase64:
          type: string
          description: Base64-encoded image data without data URL prefix
        mimeType:
          type: string
          example: image/png
        personaId:
          type: string
        apiKey:
          type: string
          description: Optional API key for live Gemma 4 mode

    CompareRequest:
      type: object
      required: [alertText]
      properties:
        alertText:
          type: string
          description: The official flood alert text to use for comparison
        apiKey:
          type: string
          description: Optional API key for live Gemma 4 mode (used only in memory, never stored)

    OfficialAlert:
      type: object
      required: [source_type, is_official_alert, extracted_alert_text, uncertainty_notes]
      properties:
        source_type:
          type: string
          enum: [text, image]
        is_official_alert:
          type: boolean
        extracted_alert_text:
          type: string
        location_mentioned:
          type: string
        time_window_mentioned:
          type: string
        official_authority_mentioned:
          type: string
        uncertainty_notes:
          type: array
          items:
            type: string

    DecisionPacket:
      type: object
      required:
        - risk_level
        - recommended_strategy
        - should_call_for_help_now
        - needs_assisted_evacuation
        - medical_continuity_risk
        - mobility_risk
        - child_safety_risk
        - connectivity_risk
        - unsafe_movement_risk
        - official_alert_facts_used
        - persona_facts_used
        - assumptions
        - prohibited_claims_avoided
      properties:
        risk_level:
          type: string
          enum: [low, medium, high, critical]
        recommended_strategy:
          type: string
          enum: [shelter_in_place, prepare_to_evacuate, call_for_assisted_evacuation, follow_official_evacuation_order]
        should_call_for_help_now:
          type: boolean
        needs_assisted_evacuation:
          type: boolean
        medical_continuity_risk:
          type: boolean
        mobility_risk:
          type: boolean
        child_safety_risk:
          type: boolean
        connectivity_risk:
          type: boolean
        unsafe_movement_risk:
          type: boolean
        official_alert_facts_used:
          type: array
          items:
            type: string
        persona_facts_used:
          type: array
          items:
            type: string
        assumptions:
          type: array
          items:
            type: string
        prohibited_claims_avoided:
          type: array
          items:
            type: string

    ActionCards:
      type: object
      required:
        - risk_summary
        - first_action
        - why_this_action
        - next_3_steps
        - must_take
        - do_not_do
        - battery_saving_tip
        - rumor_safety_note
        - sms_card
        - ivr_script
        - whatsapp_family_card
        - volunteer_rescue_card
        - offline_checklist
        - reasoning_summary
      properties:
        risk_summary:
          type: string
        first_action:
          type: string
        why_this_action:
          type: string
        next_3_steps:
          type: array
          items:
            type: string
        must_take:
          type: array
          items:
            type: string
        do_not_do:
          type: array
          items:
            type: string
        battery_saving_tip:
          type: string
        rumor_safety_note:
          type: string
        sms_card:
          type: string
        ivr_script:
          type: string
        whatsapp_family_card:
          type: string
        volunteer_rescue_card:
          type: string
        offline_checklist:
          type: array
          items:
            type: string
        reasoning_summary:
          type: string

    SafetyValidation:
      type: object
      required: [passed, errors, warnings]
      properties:
        passed:
          type: boolean
        errors:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string

    GemmaStageMetadata:
      type: object
      required: [name, model, latencyMs, outputHash]
      properties:
        name:
          type: string
        model:
          type: string
        latencyMs:
          type: number
        outputHash:
          type: string

    GemmaRunMetadata:
      type: object
      required:
        - provider
        - model
        - live
        - fallbackUsed
        - generatedAt
        - latencyMs
        - promptHash
        - outputHash
        - stages
      properties:
        provider:
          type: string
        model:
          type: string
        live:
          type: boolean
        fallbackUsed:
          type: boolean
        fallbackReason:
          type: string
        generatedAt:
          type: string
        latencyMs:
          type: number
        promptHash:
          type: string
        outputHash:
          type: string
        stages:
          type: array
          items:
            $ref: "#/components/schemas/GemmaStageMetadata"

    ActionCardResult:
      type: object
      required: [persona, alert, cards, mode, safety, metadata]
      properties:
        persona:
          $ref: "#/components/schemas/Persona"
        alert:
          $ref: "#/components/schemas/OfficialAlert"
        decisionPacket:
          $ref: "#/components/schemas/DecisionPacket"
        cards:
          $ref: "#/components/schemas/ActionCards"
        mode:
          type: string
          enum: [gemma4, demo]
        safety:
          $ref: "#/components/schemas/SafetyValidation"
        metadata:
          $ref: "#/components/schemas/GemmaRunMetadata"
        warning:
          type: string

    PersonaCardPair:
      $ref: "#/components/schemas/ActionCardResult"
